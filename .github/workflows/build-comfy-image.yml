# Black Switch — build & push the custom ComfyUI image to GHCR.
# REPO PATH:  .github/workflows/build-comfy-image.yml
name: build-comfy-image
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}          # also lets you press "Run workflow" by hand from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write            # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk + move Docker to the big partition (42GB of models need room)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo swapoff -a || true; sudo rm -f /mnt/swapfile || true
          # /mnt is the large (~65GB) ephemeral disk on ubuntu-latest; relocate Docker data-root there
          sudo systemctl stop docker || true
          sudo mkdir -p /mnt/docker
          echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker || true
          df -h

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # built-in, no extra secret needed

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            BAKE_MODELS=1
          tags: |
            ghcr.io/${{ github.repository_owner }}/black-switch-gpu:latest
            ghcr.io/${{ github.repository_owner }}/black-switch-gpu:${{ github.sha }}
          # NOTE: no gha cache — it has a 10GB ceiling, useless for a 42GB model layer and would error.
          provenance: false

      - name: Done
        run: echo "Pushed ghcr.io/${{ github.repository_owner }}/black-switch-gpu:latest — make the package Public in GHCR settings."
